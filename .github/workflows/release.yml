name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: mac-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: mac-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libgtk-3-dev

      - name: Build
        run: cargo build --profile release-dist --target ${{ matrix.target }}
        env:
          # Static link MSVC CRT so Windows users don't need VC++ redistributable
          RUSTFLAGS: ${{ runner.os == 'Windows' && '-C target-feature=+crt-static' || '' }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: disk-cleaner-${{ matrix.name }}
          path: target/${{ matrix.target }}/release-dist/disk-cleaner${{ runner.os == 'Windows' && '.exe' || '' }}

  package:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate app icon
        run: |
          cargo build --bin gen_icon --release
          ./target/release/gen_icon icon_1024.png

          # Create iconset with all required sizes
          mkdir AppIcon.iconset
          sips -z 16 16 icon_1024.png --out AppIcon.iconset/icon_16x16.png
          sips -z 32 32 icon_1024.png --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 32 32 icon_1024.png --out AppIcon.iconset/icon_32x32.png
          sips -z 64 64 icon_1024.png --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 128 128 icon_1024.png --out AppIcon.iconset/icon_128x128.png
          sips -z 256 256 icon_1024.png --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 256 256 icon_1024.png --out AppIcon.iconset/icon_256x256.png
          sips -z 512 512 icon_1024.png --out AppIcon.iconset/icon_256x256@2x.png
          sips -z 512 512 icon_1024.png --out AppIcon.iconset/icon_512x512.png
          cp icon_1024.png AppIcon.iconset/icon_512x512@2x.png

          iconutil --convert icns AppIcon.iconset --output AppIcon.icns

      - name: Create macOS universal binary and .app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Universal binary
          chmod +x artifacts/disk-cleaner-mac-arm64/disk-cleaner artifacts/disk-cleaner-mac-x86_64/disk-cleaner
          lipo -create artifacts/disk-cleaner-mac-arm64/disk-cleaner artifacts/disk-cleaner-mac-x86_64/disk-cleaner \
            -output disk-cleaner-universal
          file disk-cleaner-universal

          # .app bundle
          APP="Disk Cleaner.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp disk-cleaner-universal "$APP/Contents/MacOS/disk-cleaner"
          cp AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"

          cat > "$APP/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Disk Cleaner</string>
            <key>CFBundleDisplayName</key>
            <string>Disk Cleaner</string>
            <key>CFBundleIdentifier</key>
            <string>com.domsleee.disk-cleaner</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>disk-cleaner</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          PLIST

          codesign --force --deep -s - "$APP"

      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir dmg-contents
          cp -R "Disk Cleaner.app" dmg-contents/
          # create-dmg returns exit code 2 if it can't set the background (not fatal)
          create-dmg \
            --volname "Disk Cleaner" \
            --volicon "AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Disk Cleaner.app" 175 190 \
            --hide-extension "Disk Cleaner.app" \
            --app-drop-link 425 190 \
            "Disk-Cleaner-${GITHUB_REF_NAME}-mac.dmg" \
            dmg-contents/ \
            || true
          # Verify DMG was created
          ls -la Disk-Cleaner-*.dmg

      - name: Package Linux
        run: |
          chmod +x artifacts/disk-cleaner-linux-x86_64/disk-cleaner
          tar -czf "Disk-Cleaner-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" \
            -C artifacts/disk-cleaner-linux-x86_64 disk-cleaner

      - name: Package Windows
        run: |
          cd artifacts/disk-cleaner-windows-x86_64
          zip "../../Disk-Cleaner-${GITHUB_REF_NAME}-windows-x86_64.zip" disk-cleaner.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: |
            Disk-Cleaner-*-mac.dmg
            Disk-Cleaner-*-linux-x86_64.tar.gz
            Disk-Cleaner-*-windows-x86_64.zip
