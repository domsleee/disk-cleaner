[package]
name = "disk-cleaner"
version = "0.1.0"
edition = "2021"

[dependencies]
eframe = "0.31"
walkdir = "2"
bytesize = "2"
trash = "5"
rfd = "0.15"
dirs = "5"
serde_json = "1"
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = ["NSString", "NSData"] }
objc2-app-kit = { version = "0.3", features = ["NSWorkspace", "NSImage", "NSBitmapImageRep", "NSImageRep", "NSGraphicsContext"] }

[dev-dependencies]
tempfile = "3"
criterion = { version = "0.5", features = ["html_reports"] }
dirs = "5"

[[bench]]
name = "scan_bench"
harness = false

[[bench]]
name = "tree_memory"
harness = false
