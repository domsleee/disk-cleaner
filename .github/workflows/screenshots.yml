name: Screenshots

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/screenshots.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/screenshots.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  screenshot:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libgtk-3-dev xvfb mesa-utils libegl1-mesa-dev

      - name: Build
        run: cargo build --release --locked

      - name: Create test directory
        run: |
          mkdir -p test-data/projects/rust-app/src
          mkdir -p test-data/projects/rust-app/target/debug
          mkdir -p test-data/documents/photos
          mkdir -p test-data/documents/notes
          mkdir -p test-data/.cache/old-stuff

          # Varying file sizes to populate all views
          dd if=/dev/zero of=test-data/projects/rust-app/target/debug/big-binary bs=1024 count=5120 2>/dev/null
          dd if=/dev/zero of=test-data/projects/rust-app/src/main.rs bs=1 count=2048 2>/dev/null
          dd if=/dev/zero of=test-data/projects/rust-app/Cargo.toml bs=1 count=512 2>/dev/null
          dd if=/dev/zero of=test-data/documents/photos/vacation.jpg bs=1024 count=3072 2>/dev/null
          dd if=/dev/zero of=test-data/documents/notes/todo.md bs=1 count=256 2>/dev/null
          dd if=/dev/zero of=test-data/.cache/old-stuff/stale.tmp bs=1024 count=1024 2>/dev/null

      - name: Take screenshots (Linux)
        if: runner.os == 'Linux'
        timeout-minutes: 5
        run: |
          mkdir -p screenshots
          xvfb-run -a ./target/release/disk-cleaner test-data --screenshot screenshots/${{ matrix.platform }}

      - name: Take screenshots (macOS/Windows)
        if: runner.os != 'Linux'
        timeout-minutes: 5
        run: |
          mkdir -p screenshots
          ./target/release/disk-cleaner test-data --screenshot screenshots/${{ matrix.platform }}

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.platform }}
          path: screenshots/
          if-no-files-found: error
