[package]
name = "disk-cleaner"
version = "0.1.0"
edition = "2021"

[dependencies]
eframe = "0.31"
walkdir = "2"
bytesize = "2"
trash = "5"
rfd = "0.15"
dirs = "5"
serde_json = "1"
libc = "0.2"

[dev-dependencies]
tempfile = "3"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "scan_bench"
harness = false

[[bench]]
name = "tree_memory"
harness = false
